; ===================================================
; MYSMW 传感器配置文件
; ===================================================
; 格式：[传感器实例名]
;       subsystem  = udev 子系统 (usb/tty/net)
;       vendor_id  = USB VID（空 = 匹配所有）
;       product_id = USB PID（空 = 匹配所有）
;       driver_name = 驱动类名（工厂注册名）
;
; 添加新传感器：复制一个 [section]，修改 VID/PID 即可
; 添加新驱动类型：需同时写驱动代码 + 在 main.cpp 回调注册表加回调

增加标志位，只有标志位为true的才表示需要开启监听；
; ===================================================

[WT61-Head]
subsystem = usb
vendor_id = 05c8
product_id = 03eb
driver_name = WT61
enabled = true

[BRT38-Wheel]
subsystem = tty
vendor_id = 1a86
product_id = 7523
driver_name = BRT38
enabled = false
